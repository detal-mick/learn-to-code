<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>汉字 · Set 2</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e1117;
    --surface: #161b27;
    --surface2: #1e2535;
    --border: #2a3347;
    --teal: #3ecfb2;
    --teal-dim: #1f7f6e;
    --amber: #e8a830;
    --muted: #6b7a99;
    --text: #d8e0f0;
    --text-dim: #8a97b8;
    --known: #3ecfb2;
    --unknown: #e05a6a;
    --white: #f0f4ff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 36px 16px 56px;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(62,207,178,0.06) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 90%, rgba(232,168,48,0.05) 0%, transparent 55%);
  }

  header {
    text-align: center;
    margin-bottom: 34px;
  }

  .logo {
    font-family: 'Noto Serif SC', serif;
    font-size: 2rem;
    color: var(--teal);
    letter-spacing: 0.22em;
    line-height: 1;
  }

  .set-badge {
    display: inline-block;
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--amber);
    border: 1px solid var(--amber);
    padding: 2px 10px;
    border-radius: 20px;
    margin-top: 8px;
    opacity: 0.85;
  }

  .subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.9rem;
    color: var(--muted);
    margin-top: 6px;
    letter-spacing: 0.04em;
  }

  /* Progress */
  .progress-wrap {
    width: 100%;
    max-width: 480px;
    margin-bottom: 22px;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.7rem;
    color: var(--muted);
    font-weight: 300;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 7px;
  }

  .progress-bar {
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(to right, var(--teal), var(--amber));
    transition: width 0.4s ease;
  }

  /* Dots */
  .dots {
    display: flex;
    justify-content: center;
    gap: 5px;
    flex-wrap: wrap;
    max-width: 480px;
    margin-bottom: 24px;
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--border);
    transition: all 0.25s;
    cursor: pointer;
  }
  .dot.active { background: var(--teal); transform: scale(1.4); }
  .dot.known { background: var(--known); }
  .dot.unknown { background: var(--unknown); }

  /* Mode row */
  .mode-row {
    display: flex;
    gap: 8px;
    margin-bottom: 22px;
  }

  .btn-mode {
    padding: 6px 16px;
    font-size: 0.67rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .btn-mode.active {
    background: var(--teal);
    color: var(--bg);
    border-color: var(--teal);
    font-weight: 700;
  }

  /* Card */
  .scene {
    width: 100%;
    max-width: 420px;
    height: 290px;
    perspective: 1000px;
    cursor: pointer;
    margin-bottom: 26px;
  }

  .card {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0.2, 0.2, 1);
  }

  .card.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    box-shadow: 0 0 0 1px rgba(62,207,178,0.07), 0 12px 32px rgba(0,0,0,0.35);
  }

  /* teal accent line on left */
  .card-face::before {
    content: '';
    position: absolute;
    left: 0; top: 20%; bottom: 20%;
    width: 2px;
    background: linear-gradient(to bottom, transparent, var(--teal), transparent);
    border-radius: 2px;
  }

  .card-back { transform: rotateY(180deg); }
  .card-back::before {
    left: auto; right: 0;
    background: linear-gradient(to bottom, transparent, var(--amber), transparent);
  }

  .card-tag {
    position: absolute; top: 14px; left: 18px;
    font-size: 0.6rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--teal);
    opacity: 0.7;
  }
  .card-back .card-tag { color: var(--amber); }

  .card-num {
    position: absolute; top: 14px; right: 18px;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  .hanzi {
    font-family: 'Noto Serif SC', serif;
    font-size: 4.6rem;
    color: var(--white);
    line-height: 1;
    margin-bottom: 10px;
    text-shadow: 0 0 30px rgba(62,207,178,0.15);
  }

  .hint {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 14px;
  }

  .pinyin {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.65rem;
    color: var(--teal);
    margin-bottom: 8px;
  }

  .english {
    font-size: 1.05rem;
    color: var(--text);
    font-weight: 300;
    letter-spacing: 0.04em;
  }

  .note {
    font-size: 0.74rem;
    color: var(--muted);
    margin-top: 12px;
    text-align: center;
    font-style: italic;
    line-height: 1.5;
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 16px;
  }

  .btn { border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }

  .btn-nav {
    width: 46px; height: 46px;
    border-radius: 50%;
    background: var(--surface2);
    color: var(--text-dim);
    font-size: 1.1rem;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border);
  }
  .btn-nav:hover:not(:disabled) { background: var(--teal); color: var(--bg); border-color: var(--teal); }
  .btn-nav:disabled { opacity: 0.25; cursor: default; }

  .btn-flip {
    padding: 11px 26px;
    background: transparent;
    color: var(--teal);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    border-radius: 4px;
    border: 1px solid var(--teal-dim);
  }
  .btn-flip:hover { background: var(--teal); color: var(--bg); }

  .feedback {
    display: flex;
    gap: 10px;
    margin-bottom: 28px;
  }

  .btn-verdict {
    flex: 1; max-width: 160px;
    padding: 10px 0;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    border-radius: 4px;
    border: 1px solid;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-yes { color: var(--known); border-color: var(--known); }
  .btn-yes:hover { background: var(--known); color: var(--bg); }
  .btn-no { color: var(--unknown); border-color: var(--unknown); }
  .btn-no:hover { background: var(--unknown); color: white; }

  /* Summary */
  .summary {
    display: none;
    flex-direction: column;
    align-items: center;
    text-align: center;
    max-width: 420px;
    animation: fadeUp 0.5s ease;
  }
  .summary.visible { display: flex; }

  .summary-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 2.6rem;
    color: var(--teal);
    margin-bottom: 6px;
    text-shadow: 0 0 40px rgba(62,207,178,0.3);
  }

  .summary-sub {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--muted);
    margin-bottom: 28px;
    font-size: 0.92rem;
    letter-spacing: 0.04em;
  }

  .score-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: 100%;
    margin-bottom: 28px;
  }

  .score-box {
    padding: 22px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
  }

  .score-num {
    font-size: 2.4rem;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
  }
  .score-num.green { color: var(--known); }
  .score-num.red { color: var(--unknown); }

  .score-label {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-top: 4px;
  }

  .btn-restart {
    padding: 13px 38px;
    background: var(--teal);
    color: var(--bg);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    border-radius: 4px;
    font-weight: 700;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
  }
  .btn-restart:hover { background: var(--amber); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  .card-enter { animation: slideIn 0.3s ease forwards; }
  @keyframes slideIn { from { opacity: 0; transform: translateX(16px); } to { opacity: 1; transform: translateX(0); } }
</style>
</head>
<body>

<header>
  <div class="logo">汉字入门</div>
  <div class="set-badge">Set 2 · Words 21–40</div>
  <div class="subtitle">Beginner Chinese · 20 New Words</div>
</header>

<div class="progress-wrap" id="progressWrap">
  <div class="progress-label">
    <span id="progressText">Card 1 of 20</span>
    <span id="knownCount">Known: 0</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:5%"></div></div>
</div>

<div class="dots" id="dots"></div>

<div class="mode-row" id="modeRow">
  <button class="btn-mode active" onclick="setMode('zh')" id="modeZh">Chinese → English</button>
  <button class="btn-mode" onclick="setMode('en')" id="modeEn">English → Chinese</button>
</div>

<div class="scene" id="scene" onclick="flipCard()">
  <div class="card" id="card">
    <div class="card-face card-front">
      <span class="card-tag" id="frontTag">Chinese</span>
      <span class="card-num" id="cardNum">1 / 20</span>
      <div class="hanzi" id="frontText">妈妈</div>
      <div class="hint">tap to reveal</div>
    </div>
    <div class="card-face card-back">
      <span class="card-tag" id="backTag">English</span>
      <span class="card-num">1 / 20</span>
      <div class="pinyin" id="backPinyin">māmā</div>
      <div class="english" id="backEnglish">Mom / Mother</div>
      <div class="note" id="backNote">Common family term</div>
    </div>
  </div>
</div>

<div class="controls" id="controls">
  <button class="btn btn-nav" id="prevBtn" onclick="prevCard()" disabled>←</button>
  <button class="btn btn-flip" onclick="flipCard()">Flip Card</button>
  <button class="btn btn-nav" id="nextBtn" onclick="nextCard()">→</button>
</div>

<div class="feedback" id="feedback">
  <button class="btn-verdict btn-yes" onclick="markCard(true)">✓ Got it</button>
  <button class="btn-verdict btn-no" onclick="markCard(false)">✗ Not yet</button>
</div>

<div class="summary" id="summary">
  <div class="summary-title">完成！</div>
  <div class="summary-sub">Set 2 complete — great work!</div>
  <div class="score-grid">
    <div class="score-box">
      <div class="score-num green" id="knownFinal">0</div>
      <div class="score-label">Known</div>
    </div>
    <div class="score-box">
      <div class="score-num red" id="unknownFinal">0</div>
      <div class="score-label">Still learning</div>
    </div>
  </div>
  <button class="btn-restart" onclick="restart()">↺ Study Again</button>
</div>

<script>
const words = [
  { zh: "妈妈", pinyin: "māmā",      en: "Mom / Mother",   note: "Affectionate family term" },
  { zh: "爸爸", pinyin: "bàbà",      en: "Dad / Father",   note: "Affectionate family term" },
  { zh: "朋友", pinyin: "péngyǒu",   en: "Friend",         note: "Very common social word" },
  { zh: "老师", pinyin: "lǎoshī",    en: "Teacher",        note: "Used as a polite title too" },
  { zh: "学生", pinyin: "xuéshēng",  en: "Student",        note: "学 = study, 生 = born/life" },
  { zh: "家",   pinyin: "jiā",       en: "Home / Family",  note: "Can mean both home and family" },
  { zh: "书",   pinyin: "shū",       en: "Book",           note: "Essential noun" },
  { zh: "猫",   pinyin: "māo",       en: "Cat",            note: "A popular pet" },
  { zh: "狗",   pinyin: "gǒu",       en: "Dog",            note: "A popular pet" },
  { zh: "今天", pinyin: "jīntiān",   en: "Today",          note: "今 = now, 天 = day/sky" },
  { zh: "明天", pinyin: "míngtiān",  en: "Tomorrow",       note: "明 = bright/next" },
  { zh: "吗",   pinyin: "ma",        en: "? (question marker)", note: "Turns sentences into yes/no questions" },
  { zh: "什么", pinyin: "shénme",    en: "What",           note: "Very common question word" },
  { zh: "多少", pinyin: "duōshǎo",   en: "How many / How much", note: "Used for numbers & prices" },
  { zh: "这",   pinyin: "zhè",       en: "This",           note: "Demonstrative pronoun" },
  { zh: "那",   pinyin: "nà",        en: "That",           note: "Opposite of 这" },
  { zh: "很",   pinyin: "hěn",       en: "Very",           note: "Common adverb intensifier" },
  { zh: "也",   pinyin: "yě",        en: "Also / too",     note: "Used mid-sentence before verbs" },
  { zh: "钱",   pinyin: "qián",      en: "Money",          note: "Practical everyday word" },
  { zh: "名字", pinyin: "míngzì",    en: "Name",           note: "你叫什么名字? = What's your name?" },
];

let current = 0, flipped = false;
let known = new Array(20).fill(null);
let mode = 'zh';

function setMode(m) {
  mode = m;
  document.getElementById('modeZh').classList.toggle('active', m === 'zh');
  document.getElementById('modeEn').classList.toggle('active', m === 'en');
  if (flipped) { document.getElementById('card').classList.remove('flipped'); flipped = false; }
  updateCard();
}

function buildDots() {
  const d = document.getElementById('dots');
  d.innerHTML = '';
  words.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === current ? ' active' : '') +
      (known[i] === true ? ' known' : known[i] === false ? ' unknown' : '');
    dot.onclick = () => goTo(i);
    d.appendChild(dot);
  });
}

function updateCard() {
  const w = words[current];
  document.getElementById('cardNum').textContent = `${current + 1} / 20`;

  if (mode === 'zh') {
    document.getElementById('frontTag').textContent = 'Chinese';
    document.getElementById('backTag').textContent = 'English';
    document.getElementById('frontText').textContent = w.zh;
    document.getElementById('frontText').style.fontSize = w.zh.length > 2 ? '3.4rem' : '4.6rem';
    document.getElementById('backPinyin').textContent = w.pinyin;
    document.getElementById('backEnglish').textContent = w.en;
    document.getElementById('backNote').textContent = w.note;
  } else {
    document.getElementById('frontTag').textContent = 'English';
    document.getElementById('backTag').textContent = 'Chinese';
    document.getElementById('frontText').textContent = w.en;
    document.getElementById('frontText').style.fontSize = '1.5rem';
    document.getElementById('backPinyin').textContent = w.pinyin;
    document.getElementById('backEnglish').textContent = w.zh;
    document.getElementById('backNote').textContent = w.note;
  }

  const pct = ((current + 1) / 20) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `Card ${current + 1} of 20`;
  document.getElementById('knownCount').textContent = `Known: ${known.filter(x => x === true).length}`;
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === 19;

  document.getElementById('card').classList.add('card-enter');
  setTimeout(() => document.getElementById('card').classList.remove('card-enter'), 300);
  buildDots();
}

function flipCard() {
  flipped = !flipped;
  document.getElementById('card').classList.toggle('flipped', flipped);
}

function prevCard() {
  if (current > 0) { current--; flipped = false; document.getElementById('card').classList.remove('flipped'); updateCard(); }
}

function nextCard() {
  if (current < 19) { current++; flipped = false; document.getElementById('card').classList.remove('flipped'); updateCard(); }
  else showSummary();
}

function goTo(i) {
  current = i; flipped = false;
  document.getElementById('card').classList.remove('flipped');
  updateCard();
}

function markCard(isKnown) {
  known[current] = isKnown;
  buildDots();
  document.getElementById('knownCount').textContent = `Known: ${known.filter(x => x === true).length}`;
  if (current < 19) nextCard();
  else showSummary();
}

function showSummary() {
  document.getElementById('knownFinal').textContent = known.filter(x => x === true).length;
  document.getElementById('unknownFinal').textContent = known.filter(x => x === false).length;
  ['scene','controls','feedback','modeRow','progressWrap','dots'].forEach(id =>
    document.getElementById(id).style.display = 'none');
  document.getElementById('summary').classList.add('visible');
}

function restart() {
  current = 0; flipped = false; known = new Array(20).fill(null);
  document.getElementById('card').classList.remove('flipped');
  ['scene','controls','feedback','modeRow','progressWrap','dots'].forEach(id =>
    document.getElementById(id).style.display = '');
  document.getElementById('summary').classList.remove('visible');
  updateCard();
}

updateCard();
</script>
</body>
</html>
